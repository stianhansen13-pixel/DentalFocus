<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Langhus Tannklinikk – Tannlege på Langhus</title>
  <meta name="description" content="Langhus Tannklinikk – tannlege på Langhus med fokus på trygg, rolig og smertefri behandling, også for deg som gruer deg til tannlegen.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Static form so Netlify detects fields at build time -->
  <form name="timebestilling" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="timebestilling">
    <input name="bot-field">
    <select name="onsket-dag"><option>x</option></select>
    <select name="onsket-tidsrom"><option>x</option></select>
    <select name="timen-gjelder"><option>x</option></select>
    <input name="tidligere-kunde">
    <textarea name="beskjed"></textarea>
    <input name="fornavn">
    <input name="etternavn">
    <input name="fodselsdato">
    <input name="adresse">
    <input name="postnummer">
    <input name="sted">
    <input name="epost" type="email">
    <input name="telefon" type="tel">
  </form>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
